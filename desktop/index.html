<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snapmaker Studio</title>
  </head>
  <body style="margin:0;background:#0F111A;">
    <div id="root"></div>
    <!-- Branded splash: dark-first Asset Pack identity, shown while the engine
         sidecar boots; removed by main.tsx once React mounts. -->
    <div id="brand-splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0F111A;font-family:Inter,'Segoe UI',Arial,sans-serif;transition:opacity .35s ease;">
      <div style="font-size:30px;font-weight:800;letter-spacing:-0.02em;">
        <span style="color:#F2F2F2;font-weight:700;">Snapmaker</span>
        <span style="background:linear-gradient(90deg,#00E1FF,#00A6FF,#8F00FF,#FF8500);-webkit-background-clip:text;background-clip:text;color:transparent;">Studio</span>
      </div>
      <div style="width:220px;height:3px;border-radius:3px;background:linear-gradient(90deg,#00E1FF,#00A6FF,#8F00FF,#32CD32,#FF8500);opacity:.9;"></div>
      <div style="color:#94A3B8;font-size:13px;">The operating system for multi-material 3D printing</div>
      <div style="color:#475569;font-size:12px;">Starting the engine…</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
