<svg width="64" height="64" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Snapmaker Studio">
  <!-- Favicon: Primary Dark tile + simplified Studio Hub (saturated stream stubs +
       glowing hub + glossy cube), aligned to the Brand Identity Asset Pack.
       Reads as the Hub down to 16px. -->
  <defs>
    <filter id="fs" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="fch" x1="80" y1="98" x2="146" y2="160" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#EAF6FF"/><stop offset="0.5" stop-color="#7FE9FF"/><stop offset="1" stop-color="#16223A"/></linearGradient>
    <radialGradient id="fbloom" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.42" stop-color="#9DEFFF"/><stop offset="0.74" stop-color="#00E1FF" stop-opacity="0.55"/><stop offset="1" stop-color="#0000FF" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="#0A101C"/>
  <!-- saturated stream stubs -->
  <g fill="none" stroke-linecap="round">
    <g filter="url(#fs)" opacity="0.7" stroke-width="14"><path d="M30 94 C56 98 70 110 88 116" stroke="#00E1FF"/><path d="M30 128 C60 128 74 128 94 128" stroke="#FF8500"/><path d="M30 162 C56 158 70 146 88 140" stroke="#FF00FF"/></g>
    <g stroke-width="13"><path d="M30 94 C56 98 70 110 88 116" stroke="#00E1FF"/><path d="M30 128 C60 128 74 128 94 128" stroke="#FF8500"/><path d="M30 162 C56 158 70 146 88 140" stroke="#FF00FF"/></g>
  </g>
  <!-- chrome portal + bloom -->
  <circle cx="108" cy="128" r="42" fill="url(#fbloom)" filter="url(#fs)"/>
  <circle cx="108" cy="128" r="34" fill="none" stroke="url(#fch)" stroke-width="9"/>
  <circle cx="108" cy="128" r="27" fill="#0A101C"/>
  <circle cx="108" cy="128" r="22" fill="none" stroke="#00E1FF" stroke-width="2" opacity="0.95" filter="url(#fs)"/>
  <circle cx="108" cy="128" r="16" fill="url(#fbloom)"/>
  <circle cx="108" cy="125" r="6" fill="#FFFFFF"/>
  <!-- glossy cube (3 faces) center 188,124 s=48 -->
  <g stroke="#0A101C" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="188,76 229.6,100 188,124 146.4,100" fill="#00E1FF"/>
    <polygon points="146.4,100 188,124 188,172 146.4,148" fill="#FF00FF"/>
    <polygon points="229.6,100 188,124 188,172 229.6,148" fill="#32CD32"/>
  </g>
  <polygon points="188,76 229.6,100 188,124 146.4,100" fill="#FFFFFF" opacity="0.18"/>
</svg>
