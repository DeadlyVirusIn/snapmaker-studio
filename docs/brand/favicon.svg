<svg width="64" height="64" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Snapmaker Studio">
  <!-- Favicon: dark tile + simplified-but-faithful Studio Hub (tube ribbons +
       chrome portal w/ bloom + glossy cube). Reads as the Hub down to 16px. -->
  <defs>
    <filter id="fs" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="fch" x1="80" y1="98" x2="146" y2="160" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#EAF1FB"/><stop offset="0.5" stop-color="#6A7890"/><stop offset="1" stop-color="#232D42"/></linearGradient>
    <radialGradient id="fbloom" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.45" stop-color="#9DEFFF"/><stop offset="1" stop-color="#1E6FE0" stop-opacity="0"/></radialGradient>
    <linearGradient id="fc1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6FE6FF"/><stop offset="1" stop-color="#1FA6E0"/></linearGradient>
    <linearGradient id="fc2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF6AA8"/><stop offset="1" stop-color="#C81E73"/></linearGradient>
    <linearGradient id="fc3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5BE38E"/><stop offset="1" stop-color="#16A95C"/></linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="#0B0F19"/>
  <!-- tube ribbons -->
  <g fill="none" stroke-linecap="round">
    <g filter="url(#fs)" opacity="0.55" stroke-width="14"><path d="M30 94 C56 98 70 110 86 116" stroke="#FF1E8E"/><path d="M30 128 C60 128 74 128 92 128" stroke="#FFC400"/><path d="M30 162 C56 158 70 146 86 140" stroke="#1E84FF"/></g>
    <g stroke-width="13"><path d="M30 94 C56 98 70 110 86 116" stroke="#FF1E8E"/><path d="M30 128 C60 128 74 128 92 128" stroke="#FFC400"/><path d="M30 162 C56 158 70 146 86 140" stroke="#1E84FF"/></g>
  </g>
  <!-- chrome portal + bloom -->
  <circle cx="108" cy="128" r="40" fill="url(#fbloom)" filter="url(#fs)"/>
  <circle cx="108" cy="128" r="34" fill="none" stroke="url(#fch)" stroke-width="9"/>
  <circle cx="108" cy="128" r="27" fill="#0A1018"/>
  <circle cx="108" cy="128" r="16" fill="url(#fbloom)"/>
  <circle cx="108" cy="125" r="6" fill="#FFFFFF"/>
  <!-- glossy cube (3 faces, bevel) center 188,124 s=48 -->
  <g stroke="#0A1018" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="188,76 229.6,100 188,124 146.4,100" fill="url(#fc1)"/>
    <polygon points="146.4,100 188,124 188,172 146.4,148" fill="url(#fc2)"/>
    <polygon points="229.6,100 188,124 188,172 229.6,148" fill="url(#fc3)"/>
  </g>
  <polygon points="188,76 229.6,100 188,124 146.4,100" fill="#FFFFFF" opacity="0.16"/>
</svg>
