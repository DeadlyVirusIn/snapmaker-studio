<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Snapmaker Studio">
  <!-- Simplified Studio Hub for small sizes (transparent): tube ribbons + chrome
       portal w/ bloom + glossy cube. Still the Hub, not a bare cube. -->
  <defs>
    <filter id="ss" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="sch" x1="80" y1="98" x2="146" y2="160" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#EAF1FB"/><stop offset="0.5" stop-color="#6A7890"/><stop offset="1" stop-color="#232D42"/></linearGradient>
    <radialGradient id="sbloom" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.45" stop-color="#9DEFFF"/><stop offset="1" stop-color="#1E6FE0" stop-opacity="0"/></radialGradient>
    <linearGradient id="sc1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6FE6FF"/><stop offset="1" stop-color="#1FA6E0"/></linearGradient>
    <linearGradient id="sc2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF6AA8"/><stop offset="1" stop-color="#C81E73"/></linearGradient>
    <linearGradient id="sc3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5BE38E"/><stop offset="1" stop-color="#16A95C"/></linearGradient>
  </defs>
  <g fill="none" stroke-linecap="round">
    <g filter="url(#ss)" opacity="0.55" stroke-width="14"><path d="M22 94 C50 98 64 110 80 116" stroke="#FF1E8E"/><path d="M22 128 C54 128 68 128 86 128" stroke="#FFC400"/><path d="M22 162 C50 158 64 146 80 140" stroke="#1E84FF"/></g>
    <g stroke-width="13"><path d="M22 94 C50 98 64 110 80 116" stroke="#FF1E8E"/><path d="M22 128 C54 128 68 128 86 128" stroke="#FFC400"/><path d="M22 162 C50 158 64 146 80 140" stroke="#1E84FF"/></g>
  </g>
  <circle cx="102" cy="128" r="40" fill="url(#sbloom)" filter="url(#ss)"/>
  <circle cx="102" cy="128" r="34" fill="none" stroke="url(#sch)" stroke-width="9"/>
  <circle cx="102" cy="128" r="27" fill="#0A1018"/>
  <circle cx="102" cy="128" r="16" fill="url(#sbloom)"/>
  <circle cx="102" cy="125" r="6" fill="#FFFFFF"/>
  <g stroke="#0A1018" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="184,76 225.6,100 184,124 142.4,100" fill="url(#sc1)"/>
    <polygon points="142.4,100 184,124 184,172 142.4,148" fill="url(#sc2)"/>
    <polygon points="225.6,100 184,124 184,172 225.6,148" fill="url(#sc3)"/>
  </g>
  <polygon points="184,76 225.6,100 184,124 142.4,100" fill="#FFFFFF" opacity="0.16"/>
</svg>
