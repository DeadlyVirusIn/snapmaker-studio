    <g stroke-width="13"><path d="M22 94 C50 98 64 110 82 116" stroke="#00E1FF"/><path d="M22 128 C54 128 68 128 88 128" stroke="#FF8500"/><path d="M22 162 C50 158 64 146 82 140" stroke="#FF00FF"/></g>
  </g>
  <circle cx="102" cy="128" r="42" fill="url(#sbloom)" filter="url(#ss)"/>
  <circle cx="102" cy="128" r="34" fill="none" stroke="url(#sch)" stroke-width="9"/>
  <circle cx="102" cy="128" r="27" fill="#0A101C"/>
  <circle cx="102" cy="128" r="22" fill="none" stroke="#00E1FF" stroke-width="2" opacity="0.95" filter="url(#ss)"/>
  <circle cx="102" cy="128" r="16" fill="url(#sbloom)"/>
