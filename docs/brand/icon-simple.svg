<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Snapmaker Studio">
  <!-- Simplified Studio Hub for small sizes (transparent), aligned to the Brand
       Identity Asset Pack: saturated stream stubs + glowing hub + glossy cube.
       Still the Hub, not a bare cube. -->
  <defs>
    <filter id="ss" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="sch" x1="80" y1="98" x2="146" y2="160" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#EAF6FF"/><stop offset="0.5" stop-color="#7FE9FF"/><stop offset="1" stop-color="#16223A"/></linearGradient>
    <radialGradient id="sbloom" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.4" stop-color="#9DEFFF"/><stop offset="0.72" stop-color="#00E1FF" stop-opacity="0.55"/><stop offset="1" stop-color="#0000FF" stop-opacity="0"/></radialGradient>
    <radialGradient id="shalo" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#00E1FF" stop-opacity="0.45"/><stop offset="1" stop-color="#00E1FF" stop-opacity="0"/></radialGradient>
  </defs>
  <circle cx="102" cy="128" r="58" fill="url(#shalo)" filter="url(#ss)"/>
  <g fill="none" stroke-linecap="round">
