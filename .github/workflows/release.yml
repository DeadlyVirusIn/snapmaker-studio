name: Release (Windows installer)

# Tag-triggered release build that CLOSES the beta.4 stale-sidecar class of bug
# in tooling (not just the manual checklist): it always re-freezes the PyInstaller
# sidecar, builds the NSIS installer, and SMOKE-TESTS the freshly-bundled sidecar's
# endpoints before uploading the artifact. If any required endpoint 404s (i.e. the
# bundled sidecar is stale/missing a route), the job fails and no artifact ships.
#
# Does NOT auto-publish a GitHub Release or sign the installer (signing needs a
# certificate — see docs/windows-code-signing.md). It uploads the installer as a
# build artifact for a human to attach via the documented release flow.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install backend + freeze deps
        run: |
          python -m pip install --upgrade pip
          pip install -e backend
          pip install -r backend/requirements-build.txt

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Freeze sidecar (always fresh)
        working-directory: desktop
        run: pwsh ./scripts/build-sidecar.ps1

      - name: Build installer
        working-directory: desktop
        run: npx tauri build

      - name: Smoke-test the BUNDLED sidecar endpoints
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sc = "desktop/src-tauri/bin/snapstudio-api-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $sc)) { throw "bundled sidecar not found: $sc" }
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $sc; $psi.RedirectStandardOutput = $true
          $psi.UseShellExecute = $false; $psi.CreateNoWindow = $true
          $env:SNAPSTUDIO_API_PORT = "8910"
          $p = [System.Diagnostics.Process]::Start($psi)
          $hs = $p.StandardOutput.ReadLine() | ConvertFrom-Json
          $hdr = @{ "X-Auth-Token" = $hs.token; "Content-Type" = "application/json" }
          function Code($path, $body) {
            try { (Invoke-WebRequest -Uri "http://127.0.0.1:$($hs.port)$path" -Method POST -Headers $hdr -Body $body -UseBasicParsing -TimeoutSec 10).StatusCode }
            catch { $_.Exception.Response.StatusCode.value__ }
          }
          $health = (Invoke-WebRequest -Uri "http://127.0.0.1:$($hs.port)/health" -UseBasicParsing -TimeoutSec 10).StatusCode
          $routes = @{
            "/plate_inspect"       = '{"path":"none"}'
            "/compatibility_check" = '{"path":"none"}'
            "/scale_preview"       = '{"path":"none","scale_percent":100}'
            "/model_search"        = '{"query":"x"}'
            "/quality_check"       = '{"symptom":"stringing"}'
            "/first_layer_check"   = '{"symptom":"not_stick"}'
          }
          $fail = @()
          if ($health -ne 200) { $fail += "/health=$health" }
          foreach ($r in $routes.GetEnumerator()) {
            $c = Code $r.Key $r.Value
            Write-Host "$($r.Key) => $c"
            if ($c -eq 404) { $fail += "$($r.Key)=404 (stale sidecar)" }
          }
          $p.Kill()
          if ($fail.Count -gt 0) { throw "bundled-sidecar smoke FAILED: $($fail -join ', ')" }
          Write-Host "bundled-sidecar smoke OK"

      - name: Compute SHA256
        shell: pwsh
        run: |
          $exe = Get-ChildItem "desktop/src-tauri/target/release/bundle/nsis/*_x64-setup.exe" | Select-Object -First 1
          "$((Get-FileHash -Algorithm SHA256 $exe.FullName).Hash)  $($exe.Name)  $($exe.Length) bytes"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapmaker-studio-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*_x64-setup.exe
          if-no-files-found: error
